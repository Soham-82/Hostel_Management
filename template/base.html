<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Hostel Management{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">H</span>
      <div>
        <strong>Hostel Admin</strong>
        <small>Management System</small>
      </div>
    </div>

    <nav class="nav">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('rooms') }}">Rooms</a>
      <a href="{{ url_for('students') }}">Students</a>
      <a href="{{ url_for('payments') }}">Payments</a>
      <a href="{{ url_for('complaints') }}">Complaints</a>
    </nav>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
